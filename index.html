<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaLux Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0b0f1a;
    color:white;
    overflow-x:hidden;
}

/* HEADER */

header{
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    backdrop-filter:blur(14px);
    background:rgba(10,10,10,0.45);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-size:32px;
    font-weight:700;
    background:linear-gradient(90deg,#00e5ff,#7b61ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

nav a{
    text-decoration:none;
    color:white;
    margin-left:28px;
    transition:0.3s;
}

nav a:hover{
    color:#00e5ff;
}

/* HERO */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.hero-slider{
    width:100%;
    height:100%;
    position:relative;
}

.hero-slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:1s ease-in-out;
}

.hero-slide.active{
    opacity:1;
    z-index:1;
}

.hero-slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoom 6s linear infinite;
}

.hero-overlay{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:
    linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
    radial-gradient(circle at top left,rgba(0,229,255,0.15),transparent 30%),
    radial-gradient(circle at bottom right,rgba(123,97,255,0.15),transparent 30%);
    z-index:2;
}

.slider-dots{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:5;
}

.dot{
    width:14px;
    height:14px;
    border-radius:50%;
    background:rgba(255,255,255,0.5);
    cursor:pointer;
    transition:0.3s;
}

.dot.active{
    background:#00e5ff;
    transform:scale(1.2);
    box-shadow:0 0 12px #00e5ff;
}

@keyframes zoom{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* PRODUCTS */

.products{
    padding:90px 8%;
}

.section-title{
    text-align:center;
    margin-bottom:60px;
}

.section-title h2{
    font-size:48px;
    margin-bottom:15px;
}

.section-title p{
    color:#bdbdbd;
    max-width:700px;
    margin:auto;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.product-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    overflow:hidden;
    transition:0.4s;
    backdrop-filter:blur(10px);
}

.product-card:hover{
    transform:translateY(-12px);
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.product-card img{
    width:100%;
    height:270px;
    object-fit:cover;
}

.product-info{
    padding:24px;
}

.product-info h3{
    font-size:24px;
    margin-bottom:10px;
    line-height:1.4;
    word-break:break-word;
}

.product-info p{
    color:#bdbdbd;
    line-height:1.8;
    margin-bottom:20px;
    font-size:15px;
    word-break:break-word;
}

.price{
    font-size:26px;
    color:#00e5ff;
    font-weight:700;
    margin-top:10px;
}

/* BUTTONS */

.button-group{
    display:flex;
    gap:12px;
    margin-top:20px;
    flex-wrap:wrap;
}

.cart-btn,
.buy-btn{
    flex:1;
    border:none;
    padding:14px 18px;
    border-radius:14px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:0.3s;
    min-width:140px;
}

.cart-btn{
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.12);
}

.cart-btn:hover{
    background:white;
    color:black;
    transform:translateY(-4px);
}

.buy-btn{
    background:linear-gradient(90deg,#00e5ff,#7b61ff);
    color:white;
    box-shadow:0 10px 25px rgba(0,229,255,0.2);
}

.buy-btn:hover{
    transform:translateY(-4px) scale(1.03);
}

/* CHECKOUT */

.checkout-page{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b0f1a;
    z-index:99999;
    overflow-y:auto;
    padding:120px 8% 60px;
    display:none;
}

.checkout-page.active{
    display:block;
}

.checkout-container{
    max-width:700px;
    margin:auto;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:40px;
    backdrop-filter:blur(12px);
}

.checkout-container h2{
    font-size:40px;
    margin-bottom:15px;
}

.checkout-product{
    color:#00e5ff;
    margin-bottom:35px;
    font-size:20px;
}

.checkout-form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.checkout-form input,
.checkout-form textarea,
.checkout-form select{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
}

.checkout-form textarea{
    resize:none;
    height:120px;
}

.checkout-form input::placeholder,
.checkout-form textarea::placeholder{
    color:#c7c7c7;
}

.checkout-form select option{
    color:black;
}

.place-order-btn{
    border:none;
    padding:16px;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    background:linear-gradient(90deg,#00e5ff,#7b61ff);
    color:white;
    margin-top:10px;
}

.close-btn{
    margin-top:18px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    font-size:15px;
}

/* FEATURES */

.features{
    padding:20px 8% 90px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

.feature-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    padding:35px 25px;
    border-radius:22px;
}

.feature-box h3{
    margin-bottom:15px;
    font-size:22px;
}

.feature-box p{
    color:#c7c7c7;
    line-height:1.7;
}

/* ABOUT */

.about{
    padding:90px 8%;
    text-align:center;
}

.about h2{
    font-size:48px;
    margin-bottom:20px;
}

.about p{
    color:#c5c5c5;
    max-width:800px;
    margin:auto;
    line-height:1.9;
}

/* FOOTER */

footer{
    padding:30px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.08);
    color:#bdbdbd;
}

/* MOBILE */

@media(max-width:768px){

nav{
    display:none;
}

.section-title h2,
.about h2,
.checkout-container h2{
    font-size:32px;
}

.button-group{
    flex-direction:column;
}

.cart-btn,
.buy-btn{
    width:100%;
}

.hero{
    height:80vh;
}

.product-info h3{
    font-size:21px;
}

.product-info p{
    font-size:14px;
    line-height:1.7;
}

.checkout-container{
    padding:25px;
}

}

</style>
</head>

<body>

<!-- CHECKOUT PAYMENT METHOD -->

<select id="paymentMethod" required>
    <option value="">Select Payment Method</option>
    <option>Cash On Delivery</option>
    <option>Debit / Credit Card</option>
</select>

</body>
</html>
